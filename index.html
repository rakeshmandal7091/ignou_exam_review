<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Preparation</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    /* Navbar */
    .navbar {
      width: 100%;
      padding: 15px;
      text-align: center;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 18px;
      backdrop-filter: blur(10px);
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      padding: 30px 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    h1 {
      color: #fff;
      margin-bottom: 25px;
      font-size: 22px;
    }

    .btn-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      position: relative;
    }

    .btn {
      padding: 12px 25px;
      font-size: 15px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      min-width: 110px;
    }

    #yesBtn {
      background: linear-gradient(45deg, #00c853, #64dd17);
      color: white;
    }

    #yesBtn:hover {
      transform: scale(1.1);
    }

    #noBtn {
      background: linear-gradient(45deg, #ff1744, #ff616f);
      color: white;
      position: absolute;
    }

    #message {
      margin-top: 25px;
      font-size: 18px;
      color: #fff;
      font-weight: bold;
      opacity: 0;
      transition: 0.5s;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 10px;
      color: #fff;
      background: rgba(0,0,0,0.3);
      font-size: 14px;
    }

    /* Mobile */
    @media (max-width: 480px) {
      h1 {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    📊 Review of June 2026 Exam
  </div>

  <!-- Main -->
  <div class="main">
    <div class="container">
      <h1>📚 Have you completed your exam preparation?</h1>

      <div class="btn-container">
        <button id="yesBtn" class="btn" onclick="handleYes()">Yes ✅</button>
        <button id="noBtn" class="btn">No ❌</button>
      </div>

      <div id="message"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    © All Rights Reserved | Rakesh Kumar
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");

    function moveButton() {
      const container = document.querySelector(".container");
      const rect = container.getBoundingClientRect();

      const x = Math.random() * (rect.width - 100);
      const y = Math.random() * (rect.height - 50);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    // Desktop
    noBtn.addEventListener("mouseover", moveButton);

    // Mobile touch
    noBtn.addEventListener("touchstart", function(e) {
      e.preventDefault();
      moveButton();
    });

    // Click also escapes
    noBtn.addEventListener("click", function(e) {
      e.preventDefault();
      moveButton();
    });

    function handleYes() {
      const msg = document.getElementById("message");
      msg.innerText = "🚀 Excellent! You're on your way to becoming a top ranker.";
      msg.style.opacity = "1";
    }
  </script>

</body>
</html>
