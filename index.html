<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exam Preparation</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .card-box {
      width: 100%;
      max-width: 500px;
      padding: 40px 25px;
      border-radius: 20px;
      text-align: center;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 30px;
    }

    .btn-container {
      position: relative;
      height: 120px;
    }

    #noBtn {
      position: absolute;
    }

    #message {
      margin-top: 25px;
      font-size: 20px;
      font-weight: bold;
      opacity: 0;
      transition: 0.5s;
    }

    footer {
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar bg-dark bg-opacity-50">
    <div class="container justify-content-center">
      <span class="navbar-brand mb-0 h6 text-white">
        📊 Review of June 2026 Exam
      </span>
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="card-box">

      <h2>📚 Have you completed your exam preparation?</h2>

      <div class="btn-container">
        <button class="btn btn-success me-3 px-4 py-2" onclick="handleYes()">Yes ✅</button>
        <button class="btn btn-danger px-4 py-2" id="noBtn">No ❌</button>
      </div>

      <div id="message"></div>

    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center bg-dark bg-opacity-50 py-2">
    © All Rights Reserved | Rakesh Kumar
  </footer>

  <!-- JS -->
  <script>
    const noBtn = document.getElementById("noBtn");

    function moveButton() {
      const box = document.querySelector(".card-box");
      const rect = box.getBoundingClientRect();

      const x = Math.random() * (rect.width - 100);
      const y = Math.random() * (rect.height - 80);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    // Desktop
    noBtn.addEventListener("mouseover", moveButton);

    // Mobile
    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveButton();
    });

    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveButton();
    });

    function handleYes() {
      const msg = document.getElementById("message");
      msg.innerText = "🚀 Excellent! You're on your way to becoming a top ranker.";
      msg.style.opacity = "1";
    }
  </script>

</body>
</html>
